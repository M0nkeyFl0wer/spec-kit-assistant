openapi: 3.0.0
info:
  title: Constitutional Compliance Analyzer
  description: API contract for analyzing constitutional compliance violations in specifications
  version: 1.0.0

paths:
  /analyze/constitutional:
    post:
      summary: Analyze specification artifacts for constitutional compliance
      description: Performs comprehensive analysis against constitutional principles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                artifacts:
                  type: array
                  items:
                    type: object
                    properties:
                      path:
                        type: string
                        description: Absolute path to specification file
                      type:
                        type: string
                        enum: [spec, plan, tasks, constitution]
                      content:
                        type: string
                        description: File content for analysis
                    required: [path, type, content]
                options:
                  type: object
                  properties:
                    severity_filter:
                      type: string
                      enum: [CRITICAL, HIGH, MEDIUM, LOW]
                      description: Minimum severity level to report
                    principle_filter:
                      type: array
                      items:
                        type: string
                        enum: [swarm-first, spec-driven, test-first, character-ux, production-ready, complexity]
                    include_suggestions:
                      type: boolean
                      default: true
              required: [artifacts]
      responses:
        '200':
          description: Analysis completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysis_id:
                    type: string
                    description: Unique analysis session identifier
                  execution_time:
                    type: number
                    description: Analysis duration in milliseconds
                  constitutional_compliance:
                    type: object
                    properties:
                      overall_status:
                        type: string
                        enum: [compliant, violations, critical_violations]
                      violations:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                              enum: [swarm-first, spec-driven, test-first, character-ux, production-ready, complexity]
                            severity:
                              type: string
                              enum: [CRITICAL, HIGH, MEDIUM, LOW]
                            location:
                              type: string
                            principle_reference:
                              type: string
                            description:
                              type: string
                            remediation_suggestion:
                              type: string
                            detected_at:
                              type: string
                              format: date-time
                          required: [id, type, severity, location, description]
                  summary:
                    type: object
                    properties:
                      total_violations:
                        type: integer
                      critical_count:
                        type: integer
                      high_count:
                        type: integer
                      medium_count:
                        type: integer
                      low_count:
                        type: integer
                      implementation_ready:
                        type: boolean
                required: [analysis_id, execution_time, constitutional_compliance, summary]
        '400':
          description: Invalid input or malformed artifacts
        '500':
          description: Analysis engine error

  /analyze/performance:
    post:
      summary: Validate performance metrics against constitutional limits
      description: Checks performance measurements against constitutional standards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metrics:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      measured_value:
                        type: number
                      unit:
                        type: string
                      context:
                        type: object
                    required: [name, measured_value, unit]
                constitutional_limits:
                  type: object
                  properties:
                    animation_duration:
                      type: number
                      default: 500
                    response_time:
                      type: number
                      default: 1000
                    cpu_usage:
                      type: number
                      default: 10
                    memory_usage:
                      type: number
                      default: 50
              required: [metrics]
      responses:
        '200':
          description: Performance validation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  validation_results:
                    type: array
                    items:
                      type: object
                      properties:
                        metric_name:
                          type: string
                        compliance_status:
                          type: string
                          enum: [compliant, violation, warning]
                        measured_value:
                          type: number
                        constitutional_limit:
                          type: number
                        deviation:
                          type: number
                        recommendation:
                          type: string
                  overall_compliance:
                    type: boolean
                  violation_count:
                    type: integer

components:
  schemas:
    ConstitutionalViolation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [swarm-first, spec-driven, test-first, character-ux, production-ready, complexity]
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW]
        location:
          type: string
        principle_reference:
          type: string
        description:
          type: string
        remediation_suggestion:
          type: string
        detected_at:
          type: string
          format: date-time
      required: [id, type, severity, location, description]

    PerformanceMetric:
      type: object
      properties:
        name:
          type: string
        target_value:
          type: number
        measured_value:
          type: number
        measurement_method:
          type: string
        constitutional_limit:
          type: number
        compliance_status:
          type: string
          enum: [compliant, violation, warning]
        timestamp:
          type: string
          format: date-time
        context:
          type: object
      required: [name, measured_value, compliance_status]
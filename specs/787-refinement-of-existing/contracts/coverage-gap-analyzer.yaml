openapi: 3.0.0
info:
  title: Coverage Gap Analyzer
  description: API contract for identifying coverage gaps where requirements lack corresponding tasks or validation
  version: 1.0.0

paths:
  /analyze/coverage:
    post:
      summary: Analyze specification artifacts for coverage gaps
      description: Identifies missing tasks, requirements, or validation coverage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specification_artifacts:
                  type: object
                  properties:
                    spec:
                      type: object
                      properties:
                        path:
                          type: string
                        requirements:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              text:
                                type: string
                              type:
                                type: string
                                enum: [functional, non-functional]
                    plan:
                      type: object
                      properties:
                        path:
                          type: string
                        architecture_components:
                          type: array
                          items:
                            type: string
                    tasks:
                      type: object
                      properties:
                        path:
                          type: string
                        task_list:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              description:
                                type: string
                              file_path:
                                type: string
                              phase:
                                type: string
                  required: [spec]
                analysis_options:
                  type: object
                  properties:
                    gap_types:
                      type: array
                      items:
                        type: string
                        enum: [task, requirement, validation, test]
                    severity_threshold:
                      type: string
                      enum: [CRITICAL, HIGH, MEDIUM, LOW]
                      default: MEDIUM
                    include_suggestions:
                      type: boolean
                      default: true
              required: [specification_artifacts]
      responses:
        '200':
          description: Coverage analysis completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysis_id:
                    type: string
                  coverage_summary:
                    type: object
                    properties:
                      total_requirements:
                        type: integer
                      total_tasks:
                        type: integer
                      coverage_percentage:
                        type: number
                        minimum: 0
                        maximum: 100
                      gaps_identified:
                        type: integer
                  coverage_gaps:
                    type: array
                    items:
                      type: object
                      properties:
                        gap_id:
                          type: string
                        gap_type:
                          type: string
                          enum: [task, requirement, validation, test]
                        functional_area:
                          type: string
                        description:
                          type: string
                        severity:
                          type: string
                          enum: [CRITICAL, HIGH, MEDIUM, LOW]
                        affected_requirements:
                          type: array
                          items:
                            type: string
                        proposed_resolution:
                          type: string
                        detection_method:
                          type: string
                        blocking_factors:
                          type: array
                          items:
                            type: string
                        estimated_effort:
                          type: number
                          description: Hours to resolve gap
                  requirement_coverage:
                    type: array
                    items:
                      type: object
                      properties:
                        requirement_id:
                          type: string
                        has_tasks:
                          type: boolean
                        task_ids:
                          type: array
                          items:
                            type: string
                        has_validation:
                          type: boolean
                        coverage_status:
                          type: string
                          enum: [complete, partial, missing]
                        notes:
                          type: string
                  implementation_readiness:
                    type: object
                    properties:
                      ready_to_implement:
                        type: boolean
                      blocking_gaps:
                        type: array
                        items:
                          type: string
                      recommended_actions:
                        type: array
                        items:
                          type: string
                required: [analysis_id, coverage_summary, coverage_gaps, requirement_coverage]

  /analyze/task-mapping:
    post:
      summary: Map tasks to requirements and identify orphaned tasks
      description: Analyzes task-to-requirement mapping and identifies unmapped tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requirements:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      text:
                        type: string
                      keywords:
                        type: array
                        items:
                          type: string
                    required: [id, text]
                tasks:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      description:
                        type: string
                      file_path:
                        type: string
                    required: [id, description]
                mapping_options:
                  type: object
                  properties:
                    use_keyword_matching:
                      type: boolean
                      default: true
                    use_semantic_analysis:
                      type: boolean
                      default: true
                    confidence_threshold:
                      type: number
                      minimum: 0
                      maximum: 1
                      default: 0.7
              required: [requirements, tasks]
      responses:
        '200':
          description: Task mapping analysis completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  mapping_results:
                    type: array
                    items:
                      type: object
                      properties:
                        requirement_id:
                          type: string
                        mapped_tasks:
                          type: array
                          items:
                            type: object
                            properties:
                              task_id:
                                type: string
                              confidence:
                                type: number
                                minimum: 0
                                maximum: 1
                              mapping_reason:
                                type: string
                        coverage_status:
                          type: string
                          enum: [complete, partial, missing]
                  orphaned_tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        task_id:
                          type: string
                        description:
                          type: string
                        suggested_requirements:
                          type: array
                          items:
                            type: string
                        action_needed:
                          type: string
                          enum: [map_to_existing, create_requirement, remove_task]
                  mapping_statistics:
                    type: object
                    properties:
                      total_requirements:
                        type: integer
                      mapped_requirements:
                        type: integer
                      unmapped_requirements:
                        type: integer
                      total_tasks:
                        type: integer
                      mapped_tasks:
                        type: integer
                      orphaned_tasks:
                        type: integer
                      average_confidence:
                        type: number

  /analyze/performance-gaps:
    post:
      summary: Identify missing performance validation tasks
      description: Analyzes constitutional performance requirements and identifies missing validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                performance_requirements:
                  type: array
                  items:
                    type: object
                    properties:
                      requirement_id:
                        type: string
                      performance_target:
                        type: string
                      measurement_unit:
                        type: string
                      constitutional_limit:
                        type: number
                    required: [requirement_id, performance_target]
                existing_validation_tasks:
                  type: array
                  items:
                    type: object
                    properties:
                      task_id:
                        type: string
                      validates_requirements:
                        type: array
                        items:
                          type: string
                constitutional_standards:
                  type: object
                  properties:
                    animation_duration:
                      type: number
                      default: 500
                    response_time:
                      type: number
                      default: 1000
                    cpu_usage:
                      type: number
                      default: 10
                    memory_usage:
                      type: number
                      default: 50
              required: [performance_requirements]
      responses:
        '200':
          description: Performance gap analysis completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  performance_gaps:
                    type: array
                    items:
                      type: object
                      properties:
                        requirement_id:
                          type: string
                        performance_target:
                          type: string
                        missing_validation:
                          type: boolean
                        suggested_validation_task:
                          type: string
                        constitutional_relevance:
                          type: string
                          enum: [critical, important, standard]
                        validation_approach:
                          type: string
                  suggested_tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        task_description:
                          type: string
                        file_path:
                          type: string
                        validation_method:
                          type: string
                        success_criteria:
                          type: array
                          items:
                            type: string
                        estimated_effort:
                          type: number

components:
  schemas:
    CoverageGap:
      type: object
      properties:
        gap_id:
          type: string
        gap_type:
          type: string
          enum: [task, requirement, validation, test]
        functional_area:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW]
        proposed_resolution:
          type: string
        detection_method:
          type: string
        blocking_factors:
          type: array
          items:
            type: string
      required: [gap_id, gap_type, description, severity]

    RequirementCoverage:
      type: object
      properties:
        requirement_id:
          type: string
        has_tasks:
          type: boolean
        task_ids:
          type: array
          items:
            type: string
        has_validation:
          type: boolean
        coverage_status:
          type: string
          enum: [complete, partial, missing]
        notes:
          type: string
      required: [requirement_id, has_tasks, coverage_status]
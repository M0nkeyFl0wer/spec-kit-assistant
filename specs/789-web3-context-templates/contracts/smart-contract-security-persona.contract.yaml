# Contract: Smart Contract Security & Privacy Persona

**Module**: `src/personas/web3/smart-contract-security.js`
**Purpose**: Elicit security and privacy context through targeted questioning
**Requirements**: FR-004, FR-012, FR-014

---

## Interface

### generateQuestions(domainContext: Web3DomainContext): Question[]

**Description**: Generates prioritized security/privacy questions based on dApp type and privacy requirements.

**Input**:
```typescript
{
  dappType: DAppType,
  privacyRequirements: PrivacyLevel,
  complexityLevel: ComplexityLevel
}
```

**Output**:
```typescript
[
  {
    id: string,
    text: string,
    category: 'security' | 'privacy' | 'wallet-safety',
    priority: number,  // 1-10, higher = more critical
    followUps: string[],
    toolRecommendations: string[]
  }
]
```

**Business Rules**:
1. Always include wallet drainer protection questions (priority 10)
2. Privacy questions only if `privacyRequirements !== 'public'`
3. Advanced questions only if `complexityLevel === 'advanced'`
4. Minimum 8 questions, maximum 15
5. Questions sorted by priority descending

**Question Bank** (FR-004, FR-012):
- "What assets does this contract hold?" (priority: 10)
- "Who can call sensitive functions?" (priority: 10)
- "Are there external calls to untrusted contracts?" (priority: 9)
- "How are you preventing reentrancy?" (priority: 9)
- "What happens if ETH/tokens get stuck?" (priority: 8)
- "Do you need upgradeability?" (priority: 7)
- "What transaction data needs to be private?" (priority: varies by privacyRequirements)
- "Are you protecting against MEV/front-running?" (priority: 8)
- "What user data is exposed on-chain?" (priority: 7)
- "Do you need commit-reveal or zero-knowledge proofs?" (priority: varies)
- "How are you preventing wallet drainers?" (priority: 10)
- "Are you using limited token approvals?" (priority: 10)
- "Do you have transaction simulation?" (priority: 9)

**Performance**: <200ms (NFR-001)

---

### extractContext(answers: Answer[]): ContextInsight[]

**Description**: Analyzes user answers and extracts security/privacy insights with tool recommendations.

**Input**:
```typescript
[
  {
    questionId: string,
    answerText: string
  }
]
```

**Output**:
```typescript
[
  {
    question: string,
    answer: string,
    category: string,
    toolsRecommended: ToolRecommendation[],
    risks: string[],
    mitigations: string[]
  }
]
```

**Business Rules**:
1. Identify risks from answers (e.g., "external calls" → reentrancy risk)
2. Recommend tools based on identified needs:
   - Unlimited approvals mentioned → Recommend Revoke.cash
   - Privacy needs → Recommend Flashbots/ZK frameworks
   - No simulation → Recommend Tenderly/Blocknative
3. Mitigations must reference OpenZeppelin patterns (FR-013)
4. Wallet safety tools always included if contract holds assets

**Risk Detection Patterns**:
- "external call" → Reentrancy risk, recommend ReentrancyGuard
- "admin function" → Access control risk, recommend AccessControl/Ownable
- "no limits" / "unlimited" → Approval exploit risk, recommend limited approvals
- "public data" → Privacy leak, recommend off-chain storage
- "no simulation" → User vulnerability, recommend Tenderly/Blocknative

---

### recommendTools(insights: ContextInsight[], privacyLevel: PrivacyLevel): ToolRecommendation[]

**Description**: Generates personalized tool recommendations based on extracted context.

**Input**:
```typescript
insights: ContextInsight[]
privacyLevel: PrivacyLevel
```

**Output**:
```typescript
[
  {
    toolId: string,
    reason: string,
    priority: 'critical' | 'recommended' | 'optional',
    actionRequired: string,
    estimatedImpact: string
  }
]
```

**Business Rules** (FR-012, FR-014, FR-019):
1. **Always Critical**:
   - Revoke.cash (wallet drainer protection)
   - Limited approvals (prevent unlimited access)
   - Transaction simulation (pre-signing safety)

2. **Privacy-based Recommendations**:
   - `privacyLevel === 'pseudonymous'` → Flashbots Protect
   - `privacyLevel === 'private'` → Flashbots + ZK framework (Circom/Noir) + stealth addresses

3. **Complexity-based Recommendations**:
   - Beginner → Focus on Revoke.cash, MetaMask security, Flashbots
   - Intermediate → Add Tenderly simulation, Circom
   - Advanced → Add Noir, Aztec L2, TEE infrastructure

4. **Educational Content** (FR-020):
   - Include "$494M stolen via wallet drainers in 2024" warning
   - Explain "disconnecting wallet doesn't revoke approvals"
   - Note "transaction simulation spoofing" threat

---

### generateSecurityChecklist(domainContext: Web3DomainContext, insights: ContextInsight[]): SecurityChecklist

**Description**: Produces actionable security checklist for implementation phase.

**Input**:
```typescript
domainContext: Web3DomainContext
insights: ContextInsight[]
```

**Output**:
```typescript
{
  contractSecurity: CheckItem[],
  walletSafety: CheckItem[],
  privacyMeasures: CheckItem[],
  systemHardening: CheckItem[]
}

type CheckItem = {
  item: string,
  required: boolean,
  pattern: string,  // OpenZeppelin contract or pattern name
  testRequired: boolean
}
```

**Business Rules** (FR-011, FR-015):
1. Contract security minimum: ReentrancyGuard, AccessControl, input validation
2. Wallet safety minimum: Limited approvals, Revoke.cash integration, simulation links
3. Privacy measures: Based on `privacyLevel`
4. System hardening: Rate limiting, CSP, HTTPS-only, emergency pause


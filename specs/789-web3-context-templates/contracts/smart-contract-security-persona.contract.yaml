## Test Cases (Contract Tests)

### Test: Should generate minimum 8 questions
```javascript
test('generateQuestions minimum count', () => {
  const context = { dappType: 'token', privacyRequirements: 'public', complexityLevel: 'beginner' };
  const questions = generateQuestions(context);

  assert.ok(questions.length >= 8);
});
```

### Test: Should prioritize wallet safety for asset-holding contracts
```javascript
test('generateQuestions wallet safety priority', () => {
  const context = { dappType: 'dex', privacyRequirements: 'public', complexityLevel: 'beginner' };
  const questions = generateQuestions(context);

  const walletQuestions = questions.filter(q => q.category === 'wallet-safety');
  assert.ok(walletQuestions.length >= 3);
  assert.ok(walletQuestions.every(q => q.priority >= 9));
});
```

### Test: Should detect reentrancy risk from external calls
```javascript
test('extractContext reentrancy risk detection', () => {
  const answers = [{ questionId: 'external-calls', answerText: 'calls external DEX' }];
  const insights = extractContext(answers);

  assert.ok(insights[0].risks.some(r => r.includes('reentrancy')));
  assert.ok(insights[0].mitigations.some(m => m.includes('ReentrancyGuard')));
});
```

### Test: Should always recommend Revoke.cash
```javascript
test('recommendTools always includes Revoke.cash', () => {
  const insights = [{ category: 'wallet-safety', answer: 'users approve tokens' }];
  const tools = recommendTools(insights, 'public');

  const revokeCash = tools.find(t => t.toolId === 'revoke-cash');
  assert.ok(revokeCash);
  assert.strictEqual(revokeCash.priority, 'critical');
});
```

### Test: Should recommend privacy tools for private level
```javascript
test('recommendTools privacy stack', () => {
  const insights = [];
  const tools = recommendTools(insights, 'private');

  const privacyTools = tools.filter(t =>
    ['flashbots-protect', 'noir', 'erc-5564'].includes(t.toolId)
  );
  assert.ok(privacyTools.length >= 2);
});
```

### Test: Should include $494M warning in educational content
```javascript
test('recommendTools includes wallet drainer warning', () => {
  const insights = [];
  const tools = recommendTools(insights, 'public');

  const revokeTool = tools.find(t => t.toolId === 'revoke-cash');
  assert.ok(revokeTool.reason.includes('$494M') || revokeTool.reason.includes('wallet drainer'));
});
```

### Test: Performance requirement <200ms
```javascript
test('generateQuestions performance', () => {
  const context = { dappType: 'dex', privacyRequirements: 'private', complexityLevel: 'advanced' };
  const start = Date.now();

  generateQuestions(context);

  const duration = Date.now() - start;
  assert.ok(duration < 200, `Took ${duration}ms, should be <200ms`);
});
```


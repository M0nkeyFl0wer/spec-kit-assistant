## Examples

### Example 1: Generate Questions for DEX
```javascript
const context = {
  dappType: 'dex',
  privacyRequirements: 'pseudonymous',
  complexityLevel: 'intermediate'
};

const questions = generateQuestions(context);
// Returns 10-12 questions including:
// - Asset custody (DEX holds tokens)
// - MEV protection (DEX vulnerable to sandwich attacks)
// - Wallet drainer prevention
// - Slippage handling
```

### Example 2: Extract Context with Risk Detection
```javascript
const answers = [
  { questionId: 'external-calls', answerText: 'Yes, we call Uniswap router' },
  { questionId: 'approvals', answerText: 'Users approve our contract' }
];

const insights = extractContext(answers);
// insights[0].risks === ['Reentrancy from external call']
// insights[0].mitigations === ['Use ReentrancyGuard', 'Check-Effects-Interactions pattern']
// insights[1].toolsRecommended includes Revoke.cash
```

### Example 3: Recommend Tools for High Privacy
```javascript
const insights = [...]; // From extractContext
const tools = recommendTools(insights, 'private');

// Returns:
// - Revoke.cash (critical)
// - Flashbots Protect (critical)
// - Noir framework (recommended)
// - ERC-5564 stealth addresses (recommended)
// - Aztec L2 (optional)
```


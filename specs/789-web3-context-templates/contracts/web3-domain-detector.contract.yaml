# Contract: Web3 Domain Detector

**Module**: `src/context/web3-domain-detector.js`
**Purpose**: Detect Web3 keywords in user input and trigger specialized personas
**Requirements**: FR-001, FR-002

---

## Interface

### detectDomain(userInput: string): Web3DomainContext

**Description**: Analyzes user input for Web3-related keywords and determines if Web3 domain should be activated.

**Input**:
```typescript
userInput: string  // User's feature description or vision
```

**Output**:
```typescript
{
  detected: boolean,          // true if 2+ keywords matched
  keywords: string[],         // Matched keywords
  dappType: DAppType | null,  // Detected dApp category
  complexityLevel: ComplexityLevel,
  privacyRequirements: PrivacyLevel,
  timestamp: Date,
  confidence: number          // 0-1 confidence score
}
```

**Business Rules**:
1. Minimum 2 keywords required for `detected: true`
2. Confidence >= 0.7 required to activate personas
3. Keywords: blockchain, dApp, smart contract, NFT, DeFi, token, wallet, Ethereum, Solidity, web3, DAO, DEX, staking, lending
4. DApp type detection:
   - "swap", "exchange", "liquidity" → DEX
   - "NFT", "marketplace", "mint" → NFT_MARKETPLACE
   - "governance", "DAO", "voting" → DAO
   - "token", "ERC-20", "ERC-721" → TOKEN
   - "lending", "borrow" → LENDING
   - "staking", "rewards" → STAKING

**Performance**:
- Must complete in <100ms (NFR-001)
- Use regex for keyword matching (O(n) complexity)

**Error Handling**:
- Empty input → return `detected: false, confidence: 0`
- Invalid input type → throw TypeError

---

### inferComplexity(userInput: string): ComplexityLevel

**Description**: Infers user experience level from language patterns.

**Input**:
```typescript
userInput: string
```

**Output**:
```typescript
ComplexityLevel  // 'beginner' | 'intermediate' | 'advanced'
```

**Business Rules**:
1. BEGINNER: Phrases like "first dApp", "learning", "tutorial"
2. INTERMEDIATE: Mentions frameworks, specific technologies
3. ADVANCED: Production, optimization, security audit mentions

**Performance**: <50ms

---

### inferPrivacyLevel(userInput: string, keywords: string[]): PrivacyLevel

**Description**: Determines privacy requirements from user input.

**Input**:
```typescript
userInput: string
keywords: string[]  // Already detected keywords
```

**Output**:
```typescript
PrivacyLevel  // 'public' | 'pseudonymous' | 'private'
```

**Business Rules**:
1. PUBLIC: No privacy keywords
2. PSEUDONYMOUS: "MEV", "front-running" → basic privacy
3. PRIVATE: "private", "anonymous", "ZK", "stealth" → strong privacy

**Performance**: <50ms

---

## Examples

### Example 1: Basic dApp Detection
```javascript
const input = "I want to build an NFT marketplace on Ethereum";
const result = detectDomain(input);
// result.detected === true
// result.keywords === ['NFT', 'marketplace', 'Ethereum']
// result.dappType === 'nft-marketplace'
// result.confidence >= 0.8
```

### Example 2: Insufficient Keywords
```javascript
const input = "I want to build a web application";
const result = detectDomain(input);
// result.detected === false
// result.keywords === []
// result.confidence === 0
```

### Example 3: Privacy Requirements
```javascript
const input = "Build a private DEX with MEV protection and ZK proofs";
const result = detectDomain(input);
// result.detected === true
// result.dappType === 'dex'
// result.privacyRequirements === 'private'
```


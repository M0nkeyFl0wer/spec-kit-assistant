## Test Cases (Contract Tests)

### Test: Should detect Web3 domain with multiple keywords
```javascript
test('detectDomain with 3+ keywords', () => {
  const input = "blockchain dApp with smart contracts";
  const result = detectDomain(input);

  assert.strictEqual(result.detected, true);
  assert.ok(result.keywords.length >= 3);
  assert.ok(result.confidence >= 0.7);
});
```

### Test: Should NOT detect with single keyword
```javascript
test('detectDomain with 1 keyword', () => {
  const input = "blockchain application";
  const result = detectDomain(input);

  assert.strictEqual(result.detected, false);
});
```

### Test: Should detect DEX type
```javascript
test('detectDomain DEX identification', () => {
  const input = "decentralized exchange for token swaps";
  const result = detectDomain(input);

  assert.strictEqual(result.dappType, 'dex');
});
```

### Test: Should infer beginner complexity
```javascript
test('inferComplexity for beginner', () => {
  const input = "This is my first dApp, I'm learning Solidity";
  const result = inferComplexity(input);

  assert.strictEqual(result, 'beginner');
});
```

### Test: Should infer private privacy level
```javascript
test('inferPrivacyLevel for strong privacy', () => {
  const input = "need anonymous transactions with ZK proofs";
  const result = inferPrivacyLevel(input, ['transactions', 'ZK']);

  assert.strictEqual(result, 'private');
});
```

### Test: Performance requirement <100ms
```javascript
test('detectDomain performance', () => {
  const input = "large input ".repeat(1000) + "blockchain dApp NFT";
  const start = Date.now();

  detectDomain(input);

  const duration = Date.now() - start;
  assert.ok(duration < 100, `Took ${duration}ms, should be <100ms`);
});
```


## Test Cases (Contract Tests)

### Test: Should assess conservative risk tolerance from user concerns
```javascript
test('assessUserNeeds risk tolerance inference', () => {
  const input = "I'm very worried about wallet drainers and hacks";
  const context = { complexityLevel: 'beginner', privacyRequirements: 'public' };

  const profile = assessUserNeeds(input, context);

  assert.strictEqual(profile.riskTolerance, 'conservative');
  assert.ok(profile.concerns.includes('wallet drainers'));
});
```

### Test: Should recommend beginner-friendly tools for beginners
```javascript
test('recommendToolsForNeed respects experience level', () => {
  const need = "fully private smart contracts";
  const profile = { experienceLevel: 'beginner', privacyPreference: 'private' };

  const tools = recommendToolsForNeed(need, profile);

  // Should recommend simpler options first
  const firstTool = tools[0];
  assert.ok(['flashbots-protect', 'zkbob'].includes(firstTool.toolId));
  // Aztec should be 'optional' with warning for beginners
  const aztec = tools.find(t => t.toolId === 'aztec');
  assert.strictEqual(aztec?.priority, 'optional');
});
```

### Test: Should always present 2+ tool options
```javascript
test('recommendToolsForNeed minimum options', () => {
  const need = "basic transaction privacy";
  const profile = { experienceLevel: 'intermediate' };

  const tools = recommendToolsForNeed(need, profile);

  assert.ok(tools.length >= 2, 'Should present at least 2 options');
});
```

### Test: Should generate high severity education first
```javascript
test('generateEducation severity ordering', () => {
  const profile = { experienceLevel: 'beginner' };
  const insights = [{ category: 'wallet-safety', risks: ['unlimited approvals', 'no simulation'] }];

  const education = generateEducation(profile, insights);

  const severities = education.map(e => e.severity);
  // High severity should come first
  assert.strictEqual(severities[0], 'high');
});
```

### Test: Should include $494M stat for wallet drainer education
```javascript
test('generateEducation wallet drainer stats', () => {
  const profile = {};
  const insights = [{ category: 'wallet-safety', risks: ['unlimited approvals'] }];

  const education = generateEducation(profile, insights);

  const drainerEd = education.find(e => e.topic === 'wallet-drainers');
  assert.ok(drainerEd);
  assert.ok(drainerEd.stats.includes('$494M'));
});
```

### Test: Should record immutable consent
```javascript
test('obtainInformedConsent immutability', () => {
  const topic = 'declining-privacy-tools';
  const decision = 'decline';
  const profile = { consentGiven: [] };

  const consent = obtainInformedConsent(topic, decision, profile);

  assert.ok(consent.timestamp);
  assert.strictEqual(consent.decision, 'decline');
  // Consent record should be immutable (add to array, don't modify)
  assert.strictEqual(profile.consentGiven.length, 0);
});
```

### Test: Should allow declining critical tools with warning
```javascript
test('obtainInformedConsent critical tool decline', () => {
  const topic = 'declining-revoke-cash';
  const decision = 'decline';
  const profile = {};

  const consent = obtainInformedConsent(topic, decision, profile);

  // Should still allow decline, but flag acknowledged
  assert.strictEqual(consent.decision, 'decline');
  assert.strictEqual(consent.acknowledged, true);
});
```

### Test: Should never be pushy (language check)
```javascript
test('recommendToolsForNeed non-pushy language', () => {
  const need = "basic privacy";
  const profile = { experienceLevel: 'beginner' };

  const tools = recommendToolsForNeed(need, profile);

  // Check that language is suggestive, not mandatory
  tools.forEach(tool => {
    assert.ok(!tool.reason.includes('must'));
    assert.ok(!tool.reason.includes('required'));
    assert.ok(!tool.actionRequired.includes('You must'));
  });
});
```


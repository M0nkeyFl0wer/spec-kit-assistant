## Dependencies
- `src/templates/web3/privacy-tools/*.json` (all tool catalogs)
- Feature 788: `SocraticRefiner` (for ambiguity resolution)

---

## Error States
- `ValidationError`: Invalid profile structure
- `NotFoundError`: Referenced tool doesn't exist in catalog
- `ConsentError`: Attempting to modify immutable consent record

---

## Non-Functional Requirements
- Tool recommendation generation: <300ms
- Educational content generation: <200ms
- Consent record must be append-only (immutable)
- Profile serialization to JSON for persistence


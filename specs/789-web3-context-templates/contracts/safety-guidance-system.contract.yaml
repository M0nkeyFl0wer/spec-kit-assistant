# Contract: Safety-First Guidance System

**Module**: `src/guidance/safety-guide.js`
**Purpose**: Provide personalized, non-pushy tool recommendations based on user needs
**Requirements**: FR-019, FR-020, FR-021

---

## Interface

### assessUserNeeds(userInput: string, domainContext: Web3DomainContext): SafetyGuidanceProfile

**Description**: Creates initial safety guidance profile from user input and domain context.

**Input**:
```typescript
userInput: string
domainContext: Web3DomainContext
```

**Output**:
```typescript
{
  userId: string | null,
  riskTolerance: RiskTolerance,      // 'conservative' | 'balanced' | 'aggressive'
  privacyPreference: PrivacyLevel,   // from domainContext
  experienceLevel: ComplexityLevel,  // from domainContext
  concerns: string[],                // Extracted from user input
  recommendedTools: [],              // Populated by recommendTools()
  educationalContent: [],            // Populated by generateEducation()
  consentGiven: []
}
```

**Business Rules**:
1. Default `riskTolerance` to 'balanced' unless user indicates otherwise
2. Extract concerns from phrases like "worried about", "concerned", "how to prevent"
3. Map privacyPreference from domainContext.privacyRequirements

---

### recommendToolsForNeed(need: string, profile: SafetyGuidanceProfile): ToolRecommendation[]

**Description**: Returns appropriate tools based on specific user need (FR-019).

**Input**:
```typescript
need: string  // e.g., "I want basic transaction privacy"
profile: SafetyGuidanceProfile
```

**Output**:
```typescript
[
  {
    toolId: string,
    reason: string,
    priority: 'critical' | 'recommended' | 'optional',
    actionRequired: string,
    estimatedImpact: string
  }
]
```

**Need Mapping** (FR-019):
- "basic transaction privacy" → Flashbots Protect (easiest, 80% adoption)
- "simple private transfers" → zkBob (user-friendly), ERC-5564 stealth addresses
- "DeFi with privacy" → Railgun privacy protocol
- "fully private smart contracts" → Aztec Network L2, Noir framework
- "front-running protection" → Flashbots Protect, commit-reveal patterns
- "maximum privacy" → Combination (stealth + ZK + private RPC)
- "protect against wallet drainers" → Revoke.cash + limited approvals + simulation
- "audit wallet security" → Revoke.cash checker + Etherscan token approvals
- "protect dApp users" → Integrate Tenderly/Blocknative + enforce limited approvals
- "first steps" → Revoke.cash extension + audit approvals + hardware wallet

**Business Rules**:
1. Always present 2-3 options, never single recommendation
2. Order by: easiest first, then by adoption rate
3. Include cost/complexity tradeoffs (FR-019)
4. Respect user's `experienceLevel` (don't recommend advanced tools to beginners without warning)

---

### generateEducation(profile: SafetyGuidanceProfile, insights: ContextInsight[]): EducationalItem[]

**Description**: Creates educational content based on identified risks (FR-020).

**Input**:
```typescript
profile: SafetyGuidanceProfile
insights: ContextInsight[]  // From persona context extraction
```

**Output**:
```typescript
[
  {
    topic: string,
    content: string,
    severity: 'high' | 'medium' | 'low',
    stats: string,
    presented: boolean,
    understood: boolean | null
  }
]
```

**Mandatory Educational Topics** (FR-020):
1. **Wallet Drainers**:
   - Content: "Wallet drainers use malicious contracts to steal assets via unlimited approvals"
   - Stats: "$494M stolen via wallet drainers in 2024"
   - Severity: high

2. **Approval Persistence**:
   - Content: "Disconnecting your wallet doesn't revoke approvals - you must explicitly revoke them"
   - Stats: "Most users don't realize approvals stay active indefinitely"
   - Severity: high

3. **Transaction Simulation Spoofing**:
   - Content: "New 2025 threat where attackers fake simulation results to trick users"
   - Stats: "143.45 ETH ($460k) stolen in one attack"
   - Severity: medium

4. **Tornado Cash Legal Uncertainty**:
   - Content: "Sanctions lifted March 2025, but legal risk remains for users"
   - Stats: "First protocol sanctioned by OFAC"
   - Severity: medium (if privacy tools mentioned)

5. **Aztec zk.money Sunset**:
   - Content: "Aztec's popular zk.money UI sunset, use alternatives"
   - Stats: "Network still active, UI discontinued"
   - Severity: low (if Aztec mentioned)

**Business Rules**:
1. Present education BEFORE recommending related tools
2. High severity topics presented first
3. Track `understood` flag from user acknowledgment
4. Maximum 5 educational items per session (avoid overwhelming)

---

### obtainInformedConsent(topic: string, decision: 'accept' | 'decline', profile: SafetyGuidanceProfile): ConsentRecord

**Description**: Records user's informed consent after education (FR-021).

**Input**:
```typescript
topic: string             // e.g., 'declining-privacy-tools'
decision: 'accept' | 'decline'
profile: SafetyGuidanceProfile
```

**Output**:
```typescript
{
  topic: string,
  decision: 'accept' | 'decline',
  reasoning: string,      // Why user chose this
  timestamp: Date,
  acknowledged: boolean   // User confirmed understanding risks
}
```

**Business Rules** (FR-021):
1. **Never Pushy**: Present options, don't mandate
2. **Respect Choice**: Declining privacy/security tools is valid if user acknowledges risks
3. **Frame Neutrally**: "Here are your options" not "You must use this"
4. **Provide 'Why'**: Explain rationale for each recommendation
5. **Allow Decline**: User can decline any non-critical tool
6. **Critical Tools**: Revoke.cash, limited approvals are "critical" but still optional (with strong warning)

**Consent Flow**:
```
1. Present educational content
2. Show tool options with tradeoffs
3. Ask for user preference
4. If 'decline' → Show risks, ask for acknowledgment
5. Record consent (immutable audit trail)
```

---

### generateSummary(profile: SafetyGuidanceProfile): SafetySummary

**Description**: Produces final summary of safety recommendations and user choices.

**Input**:
```typescript
profile: SafetyGuidanceProfile
```

**Output**:
```typescript
{
  toolsAccepted: ToolRecommendation[],
  toolsDeclined: ToolRecommendation[],
  risksSummary: string[],
  nextSteps: string[],
  estimatedImplementationTime: string
}
```

**Business Rules**:
1. Highlight any declined critical tools
2. Provide concrete next steps (links to Revoke.cash, Tenderly docs, etc.)
3. Estimate implementation time based on accepted tools
4. Include checklist for Phase 2 task generation


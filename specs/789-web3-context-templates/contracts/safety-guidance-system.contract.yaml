## Examples

### Example 1: Assess Beginner User Needs
```javascript
const input = "I'm building my first NFT marketplace, worried about security";
const context = { dappType: 'nft-marketplace', complexityLevel: 'beginner', privacyRequirements: 'public' };

const profile = assessUserNeeds(input, context);
// profile.concerns === ['security']
// profile.riskTolerance === 'conservative' (inferred from 'worried')
// profile.experienceLevel === 'beginner'
```

### Example 2: Recommend Tools for Privacy Need
```javascript
const need = "I need DeFi with privacy";
const profile = { experienceLevel: 'intermediate', privacyPreference: 'private' };

const tools = recommendToolsForNeed(need, profile);
// tools[0] === { toolId: 'railgun', reason: 'Privacy protocol for DeFi interactions', ... }
// tools[1] === { toolId: 'flashbots-protect', reason: 'Prevents MEV attacks', ... }
// tools[2] === { toolId: 'aztec', priority: 'optional', ... }
```

### Example 3: Generate Education for Wallet Drainers
```javascript
const profile = { experienceLevel: 'beginner' };
const insights = [{ category: 'wallet-safety', risks: ['unlimited approvals'] }];

const education = generateEducation(profile, insights);
// education[0].topic === 'wallet-drainers'
// education[0].stats === '$494M stolen via wallet drainers in 2024'
// education[0].severity === 'high'
```

### Example 4: Obtain Consent for Declining Privacy Tools
```javascript
const topic = 'declining-flashbots-protect';
const decision = 'decline';
const profile = { ... };

const consent = obtainInformedConsent(topic, decision, profile);
// consent.decision === 'decline'
// consent.reasoning === 'User prefers public transactions'
// consent.acknowledged === true (user confirmed understanding MEV risk)
```

